services:
  - type: web
    name: shamba-smart-backend
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 4
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DJANGO_SETTINGS_MODULE
        value: core.settings
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: shamba-smart-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: shamba-smart-backend.onrender.com,localhost
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: shamba-smart-db
    plan: free
